name: Generate Template Index

on:
  push:
    tags:
      - "v*"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout TAG (source of truth)
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Step 2: Generate version data from tag
      - name: Generate index (from tag)
        run: node scripts/generateIndex.js
        env:
          VERSION: ${{ github.ref_name }}

      # Save generated file
      - name: Save generated version
        run: |
          mkdir tmp
          cp template-index.json tmp/template-index.json

      # ✅ Step 3: Checkout main (target state)
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      # ✅ Step 4: Merge version into existing index
      - name: Merge version into main index
        run: node scripts/mergeIndex.js

      # ✅ Step 5: Commit
      - name: Commit updated index
        run: |
          git config user.name "quicksi-bot"
          git config user.email "bot@quicksi.dev"

          git add template-index.json

          git diff --cached --quiet || git commit -m "chore: add version ${{ github.ref_name }}"

          git push origin main
