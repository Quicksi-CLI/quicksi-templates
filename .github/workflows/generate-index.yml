name: Generate Template Index

on:
  push:
    tags:
      - "v*"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout TAG (for correct version content)
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Step 2: Generate index FROM tag
      - name: Generate index
        run: node scripts/generateIndex.js
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      # Save artifact temporarily
      - name: Save generated file
        run: |
          mkdir tmp
          cp template-index.json tmp/template-index.json

      # ✅ Step 3: Switch to main branch
      - name: Switch to main
        run: |
          git fetch origin main
          git checkout main

        # Restore generated file
      - name: Restore generated file
        run: |
          git fetch origin main
          cp tmp/template-index.json template-index.json

      # ✅ Step 5: Commit + push
      - name: Commit generated index
        run: |
          git config user.name "quicksi-bot"
          git config user.email "bot@quicksi.dev"

          git add template-index.json

          git diff --cached --quiet || git commit -m "chore: update index for ${{ github.ref_name }}"

          git push origin main