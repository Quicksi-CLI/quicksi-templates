name: Generate Template Index

on:
  push:
    tags:
      - "v*"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout TAG (source of truth)
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Step 2: Generate index from tag
      - name: Generate index (from tag)
        run: node scripts/generateIndex.js
        env:
          VERSION: ${{ github.ref_name }}

      # ✅ Step 3: Upload generated version as artifact
      - name: Save generated version
        uses: actions/upload-artifact@v4
        with:
          name: generated-index
          path: template-index.json

      # ✅ Step 4: Checkout main branch (target history)
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      # ✅ Step 5: Download generated version
      - name: Restore generated version
        uses: actions/download-artifact@v4
        with:
          name: generated-index
          path: tmp

      # ✅ Step 6: Merge version into existing index
      - name: Merge version into main index
        run: node scripts/mergeIndex.js

      # ✅ Step 7: Commit + push (only if changed)
      - name: Commit updated index
        run: |
          git config user.name "quicksi-bot"
          git config user.email "bot@quicksi.dev"

          git add template-index.json

          git diff --cached --quiet || git commit -m "chore: add version ${{ github.ref_name }}"

          git push origin main