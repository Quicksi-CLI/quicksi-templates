name: Generate Template Index

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important for tags + branch switching

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Step 2: Generate index based on context
      - name: Generate index (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/generateIndex.js
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Generate index (main -> latest)
        if: github.ref == 'refs/heads/main'
        run: node scripts/generateIndex.js
        env:
          GITHUB_REF_NAME: latest

      # ✅ Step 3: Save generated file
      - name: Save generated file
        run: |
          mkdir -p tmp
          cp template-index.json tmp/template-index.json

      # ✅ Step 4: Switch to main safely
      - name: Switch to main
        run: |
          git stash
          git fetch origin main
          git checkout main
          git pull origin main
          git stash pop || true

      # ✅ Step 5: Restore generated file
      - name: Restore generated file
        run: |
          cp tmp/template-index.json template-index.json

      # ✅ Step 6: Commit + push (only if changed)
      - name: Commit generated index
        run: |
          git config user.name "quicksi-bot"
          git config user.email "bot@quicksi.dev"

          git add template-index.json

          git diff --cached --quiet || git commit -m "chore: update index for ${{ github.ref_name || 'main' }}"

          git push origin main
