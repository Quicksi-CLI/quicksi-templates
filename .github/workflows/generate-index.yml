name: Generate Template Index

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20   # your script runtime (NOT the action runtime)

      - name: Generate index
        run: node scripts/generateIndex.js
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit generated files
        run: |
          git config user.name "quicksi-bot"
          git config user.email "bot@quicksi.dev"

          git add template-index.json authors.json

          git diff --cached --quiet || git commit -m "chore: update index for release"

          git push origin main